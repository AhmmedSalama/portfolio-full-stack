@if (footerData(); as data) {
<footer class="w-full py-12 px-6 lg:px-12 mt-20 border-t border-[var(--nav-border)] [background-color:var(--bg-primary)]">
  <div class="max-w-[1440px] mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-12">
      
      <div class="space-y-4">
        <h3 class="text-[var(--text-secondary)] text-xl font-bold tracking-tight">About</h3>
        <p class="text-[var(--text-muted)] leading-relaxed max-w-xs">
          {{ data.aboutText }}
        </p>
      </div>

      <div class="space-y-4">
        <h3 class="text-[var(--text-secondary)] text-xl font-bold tracking-tight">Get In Touch</h3>
        <div class="space-y-3">
          <a [href]="'mailto:' + data.email" class="flex items-center gap-3 text-[var(--text-muted)] hover:text-[var(--text-secondary)] transition-colors group">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <span>{{ data.email }}</span>
          </a>
          <a [href]="'tel:' + data.phone" class="flex items-center gap-3 text-[var(--text-muted)] hover:text-[var(--text-secondary)] transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            <span>{{ data.phone }}</span>
          </a>
          <p class="text-[var(--text-muted)] text-sm italic pt-1">{{ data.freelanceStatus }}</p>
        </div>
      </div>

      <div class="space-y-4">
        <h3 class="text-[var(--text-secondary)] text-xl font-bold tracking-tight">Connect</h3>
        <div class="flex gap-4">
          <a [href]="data.linkedin" target="_blank" class="p-3 rounded-lg bg-[var(--card-bg)] border border-[var(--nav-border)] text-[var(--text-muted)] hover:text-[var(--text-secondary)] hover:bg-[var(--nav-bg)] transition-all duration-300">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
          </a>
          <a [href]="data.github" target="_blank" class="p-3 rounded-lg bg-[var(--card-bg)] border border-[var(--nav-border)] text-[var(--text-muted)] hover:text-[var(--text-secondary)] hover:bg-[var(--nav-bg)] transition-all duration-300">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.841 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          </a>
          <a [href]="data.facebook" target="_blank" class="p-3 rounded-lg bg-[var(--card-bg)] border border-[var(--nav-border)] text-[var(--text-muted)] hover:text-[var(--text-secondary)] hover:bg-[var(--nav-bg)] transition-all duration-300">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg>
          </a>
        </div>
      </div>
    </div>

    <div class="pt-8 border-t border-[var(--nav-border)] text-center space-y-2">
      <p class="text-[var(--text-muted)] text-sm">
        {{ data.copyrightText }}
      </p>
      <p class="text-[var(--text-muted)] text-xs font-medium uppercase tracking-[0.2em]">
        Crafted with lots of coffee
      </p>
    </div>
  </div>
</footer>
}
