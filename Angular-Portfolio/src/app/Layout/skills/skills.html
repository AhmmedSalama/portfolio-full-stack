<section id="skills" class="mt-10 mx-auto border-2 rounded-[.9rem] h-fit [border-color:var(--nav-border)] [background-color:var(--bg-tertiary)] p-2">
  <div class="border [border-color:var(--nav-border)] rounded-[.9rem] [background-color:var(--sec-bg)]">
    
    <div class="mainSectionHeader p-4 flex items-center justify-between rounded-t-[.8rem] [background-color:var(--text-muted)]">
      <div class="flex items-center justify-start">
        <span class="bg-[#ff5f56] w-[10px] h-[10px] rounded-full mr-2 shadow-[0_0_5px_#ff5f56]"></span>
        <span class="bg-[#ffbd2e] w-[10px] h-[10px] rounded-full mr-2 shadow-[0_0_5px_#ffbd2e]"></span>
        <span class="bg-[#27c93f] w-[10px] h-[10px] rounded-full mr-2 shadow-[0_0_5px_#27c93f]"></span>
      </div>
      <h2 class="text-xl lg:text-2xl font-bold tracking-[.2rem] lg:tracking-[.3rem] text-white uppercase">
        SKILLS
      </h2>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-16 p-10 justify-items-center items-center mx-auto w-full max-w-[1200px]">
      
      @for (skill of skillsList; track skill._id) {
        <div class="group flex flex-col items-center gap-5 cursor-default">
          <div class="skill-card w-24 h-24 lg:w-28 lg:h-28 flex items-center justify-center rounded-[28px] bg-[#1a1a1a] border border-white/10 transition-all duration-500 group-hover:-translate-y-3 group-hover:border-white/40 group-hover:bg-[#252525] p-6 overflow-hidden shadow-lg">
            <img [src]="skill.icon" [alt]="skill.name" class="w-full h-full object-contain grayscale group-hover:grayscale-0 transition-all duration-500">
          </div>
          <span class="text-white/50 font-bold tracking-[0.2em] text-sm uppercase group-hover:text-white transition-all">
            {{skill.name}}
          </span>
        </div>
      } @empty {
        <div class="col-span-full py-10 text-center">
          <p class="text-white/30 uppercase tracking-widest text-xs animate-pulse">Loading Skills...</p>
        </div>
      }

    </div>
  </div>
</section>
