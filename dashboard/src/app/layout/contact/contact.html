<section class="pt-28 pb-12 px-6 bg-[#f8fafc] min-h-screen">
  <div class="max-w-[800px] mx-auto">
    
    <div class="mb-8">
      <h2 class="text-blue-600 font-bold uppercase tracking-widest text-xs">Settings</h2>
      <p class="text-3xl font-black text-slate-900">Contact Information</p>
    </div>

    <div class="bg-white border border-slate-200 rounded-[2.5rem] shadow-xl overflow-hidden">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="p-8 lg:p-12 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase ml-2">Email Address</label>
            <input formControlName="email" type="email" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none font-medium">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase ml-2">Phone Number</label>
            <input formControlName="phone" type="text" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none font-medium">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase ml-2">WhatsApp Number</label>
            <input formControlName="whatsapp" type="text" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none font-medium">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase ml-2">Location</label>
            <input formControlName="location" type="text" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none font-medium">
          </div>
        </div>

        <hr class="border-slate-100 my-4">

        <div class="space-y-4">
          <h4 class="text-sm font-black text-slate-900 uppercase">Social Media Profiles</h4>
          
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><i class="fab fa-linkedin text-lg"></i></span>
            <input formControlName="linkedin" placeholder="LinkedIn URL" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none">
          </div>

          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><i class="fab fa-github text-lg"></i></span>
            <input formControlName="github" placeholder="GitHub URL" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none">
          </div>

          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><i class="fab fa-facebook text-lg"></i></span>
            <input formControlName="facebook" placeholder="Facebook URL" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-blue-500 outline-none">
          </div>
        </div>

        <div class="pt-6 flex items-center gap-4">
          <button type="submit" [disabled]="contactForm.invalid || isLoading()" 
            class="flex-1 py-4 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 disabled:opacity-50 transition-all shadow-xl shadow-blue-100 uppercase tracking-widest text-xs">
            {{ isLoading() ? 'Saving...' : 'Update Information' }}
          </button>
          
          @if (isSuccess()) {
            <span class="text-green-600 font-bold text-sm animate-bounce">✓ Saved!</span>
          }
        </div>
      </form>
    </div>
  </div>
</section>
