<section class="pt-32 pb-12 px-6">
  <div class="max-w-[1200px] mx-auto">
    <div class="mb-8">
      <h2 class="text-sm font-bold text-blue-600 uppercase tracking-widest mb-1">Overview</h2>
      <p class="text-2xl font-bold text-slate-900">Performance Metrics</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (item of stats(); track item.label) {
        <div class="group relative bg-white border border-slate-200 p-6 rounded-3xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07)] hover:shadow-xl hover:border-blue-200 transition-all duration-300">
          
          <div class="w-12 h-12 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center text-xl mb-4 group-hover:scale-110 transition-transform">
              {{ item.icon }}
          </div>

          <div class="relative">
            <h3 class="text-4xl font-black text-slate-900 tracking-tight">
              {{ item.value }}
            </h3>
            <p class="text-slate-500 font-medium text-sm mt-1">
              {{ item.label }}
            </p>
          </div>

          <div class="absolute bottom-0 left-8 right-8 h-1 bg-blue-500 rounded-t-full scale-x-0 group-hover:scale-x-100 transition-transform duration-500"></div>
        </div>
      }
    </div>
  </div>
</section>
