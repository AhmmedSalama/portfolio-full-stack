<section class="pt-32 pb-12 px-6 bg-[#f8fafc] min-h-screen">
  <div class="max-w-[1000px] mx-auto">
    
    <div class="flex justify-between items-center mb-10">
      <div>
        <h2 class="text-blue-600 font-bold uppercase tracking-widest text-xs">Technical Stack</h2>
        <p class="text-3xl font-black text-slate-900">Skills & Tools</p>
      </div>
      <button (click)="openModal()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-lg">
        + Add Skill
      </button>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
      @for (skill of skills(); track skill._id) {
        <div class="bg-white border border-slate-200 p-4 rounded-3xl flex flex-col items-center group relative hover:border-blue-300 transition-all shadow-sm">
          
          <div class="w-16 h-16 mb-3 flex items-center justify-center bg-slate-50 rounded-2xl p-2 group-hover:scale-110 transition-transform">
            <img [src]="skillService.getIconUrl(skill.icon)" class="w-full h-full object-contain" [alt]="skill.name">
          </div>
          
          <span class="font-bold text-slate-700 text-sm uppercase tracking-wider">{{ skill.name }}</span>

          <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button (click)="openModal(skill)" class="p-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2"/></svg>
            </button>
            <button (click)="deleteSkill(skill._id)" class="p-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</section>

@if (isModalOpen()) {
  <div class="fixed inset-0 z-[200] flex items-center justify-center p-4 backdrop-blur-md bg-slate-900/10">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 animate-in fade-in zoom-in duration-300">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-black text-slate-900 uppercase tracking-tighter">
            {{ selectedSkill() ? 'Edit Skill' : 'New Skill' }}
        </h2>
        <button (click)="closeModal()" class="text-slate-400 hover:text-red-500 font-bold">Close</button>
      </div>

      <form [formGroup]="skillForm" (ngSubmit)="saveSkill()" class="space-y-5">
        <div class="relative w-24 h-24 mx-auto bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl overflow-hidden flex flex-col items-center justify-center cursor-pointer hover:border-blue-400">
          @if (imagePreview()) {
            <img [src]="imagePreview()" class="absolute inset-0 w-full h-full object-contain p-2">
          } @else {
            <span class="text-[10px] font-bold text-slate-400 text-center px-2">UPLOAD ICON</span>
          }
          <input type="file" (change)="onFileSelected($event)" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
        </div>

        <input formControlName="name" placeholder="Technology Name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 font-bold">

        <button type="submit" [disabled]="skillForm.invalid" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 disabled:opacity-50 transition-all shadow-xl shadow-blue-100 uppercase tracking-widest text-xs">
          {{ selectedSkill() ? 'Update' : 'Save' }} Skill
        </button>
      </form>
    </div>
  </div>
}
